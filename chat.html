<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OpenRouter OSS Chatbot</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        #chat-box { scroll-behavior: smooth; }
    </style>
</head>
<body class="bg-slate-900 text-slate-100 h-screen flex relative overflow-hidden font-sans select-none">

    <div id="splash-screen" class="fixed inset-0 bg-slate-950 z-50 flex flex-col items-center justify-center gap-4 transition-all duration-700 opacity-100">
        <div class="relative flex items-center justify-center">
            <div class="absolute w-24 h-24 bg-indigo-500/20 rounded-full animate-ping duration-1000"></div>
            <div class="absolute w-16 h-16 bg-blue-500/30 rounded-full animate-pulse"></div>
            <div class="relative text-5xl bg-slate-900 p-5 rounded-2xl border border-slate-800 shadow-2xl">🤖</div>
        </div>
        <div class="text-center mt-2">
            <h1 class="text-2xl font-bold tracking-wider bg-gradient-to-r from-blue-400 to-indigo-400 bg-clip-text text-transparent">
                AI Assistant
            </h1>
            <p class="text-xs text-slate-500 font-medium tracking-widest uppercase mt-1 animate-pulse">
                Initializing System...
            </p>
        </div>
    </div>

    <div id="sidebar-overlay" class="fixed inset-0 bg-black/60 z-20 opacity-0 pointer-events-none transition-opacity duration-300"></div>

    <aside id="sidebar" class="fixed inset-y-0 left-0 w-72 bg-slate-950 border-r border-slate-800 flex flex-col justify-between z-30 -translate-x-4 opacity-0 pointer-events-none transition-all duration-300 md:relative md:translate-x-0 md:opacity-100 md:pointer-events-auto shrink-0">
        <div class="p-4 flex flex-col gap-4 overflow-hidden h-full">
            <button id="new-chat-btn" class="w-full bg-indigo-600 hover:bg-indigo-500 text-white font-medium py-2.5 px-4 rounded-xl transition-all flex items-center justify-center gap-2 cursor-pointer shadow-sm active:scale-98">
                <span>➕</span> New Chat
            </button>
            
            <div class="flex-1 flex flex-col min-h-0">
                <h2 class="text-xs font-semibold text-slate-500 uppercase tracking-wider mb-2 px-1">Recent Chats</h2>
                <div id="history-list" class="flex-1 overflow-y-auto space-y-1 pr-1 custom-scrollbar select-text">
                    </div>
            </div>
        </div>
        
        <div class="p-4 border-t border-slate-900 flex flex-col gap-2">
            <button id="delete-current-btn" class="w-full bg-slate-900 hover:bg-slate-800 text-slate-300 border border-slate-800 font-medium py-2 px-4 rounded-xl transition-all flex items-center justify-center gap-2 cursor-pointer text-xs active:scale-98">
                <span>❌</span> Delete Active Chat
            </button>
            <button id="clear-all-btn" class="w-full bg-rose-950/40 hover:bg-rose-900/60 text-rose-400 border border-rose-900/40 font-medium py-2 px-4 rounded-xl transition-all flex items-center justify-center gap-2 cursor-pointer text-xs active:scale-98">
                <span>🗑️</span> Clear All History
            </button>
            <div class="text-[10px] text-slate-600 text-center select-none">
                Web Search Enabled 🌐
            </div>
        </div>
    </aside>

    <div class="flex-1 flex flex-col justify-between h-full relative min-w-0 select-text">
        
        <header class="bg-slate-800 border-b border-slate-700 p-4 sticky top-0 z-10 shadow-md flex justify-between items-center select-none">
    <div class="flex items-center gap-3">
        <a href="index.html" 
           class="text-xl p-2 cursor-pointer transition-all hover:bg-slate-700 active:scale-90 rounded-xl border border-slate-700 text-slate-300"
           title="Back to Dashboard">
           🏠
        </a>
        
        <button id="mobile-menu-btn" class="text-xl p-2 cursor-pointer transition-all hover:bg-slate-700 active:scale-90 rounded-xl border border-slate-700 text-slate-300">☰</button>
        
        <h1 class="text-lg font-bold tracking-wide flex items-center gap-2">
            🤖 <span class="bg-gradient-to-r from-blue-300 to-indigo-300 bg-clip-text text-transparent">AI Assistant</span>
        </h1>
    </div>
    
    <div class="flex items-center gap-2">
        <button id="model-toggle-btn" class="text-xs bg-emerald-500/10 text-emerald-400 hover:bg-emerald-500/20 px-3 py-1.5 rounded-full border border-emerald-500/30 font-medium transition-all cursor-pointer shadow-sm">
            gpt-oss-120b
        </button>
    </div>
</header>


        <main id="chat-box" class="flex-1 w-full max-w-4xl mx-auto p-4 space-y-4 overflow-y-auto max-h-[calc(100vh-160px)]">
            </main>

        <footer class="bg-slate-800 border-t border-slate-700 p-4 sticky bottom-0 select-none">
            <form id="chat-form" class="max-w-4xl mx-auto flex gap-2">
                <input type="text" id="user-input" autocomplete="off" placeholder="Ask something or look up live data..." 
                       class="flex-1 bg-slate-950 border border-slate-600 rounded-xl px-4 py-3 text-slate-100 placeholder-slate-500 focus:outline-none focus:border-indigo-500 transition-colors select-text">
                <button type="submit" id="submit-btn" 
                        class="bg-indigo-600 hover:bg-indigo-500 text-white font-medium px-6 py-3 rounded-xl transition-colors disabled:opacity-50 disabled:cursor-not-allowed">
                    Send
                </button>
            </form>
        </footer>
    </div>

    <script>
        // 🔑 PASTE YOUR OPENROUTER API KEY HERE
        const OPENROUTER_API_KEY = "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";

        const MODELS = {
            "gpt-oss-120b": "openai/gpt-oss-120b:free",
            "gpt-oss-20b": "openai/gpt-oss-20b:free"
        };
        let currentModelKey = "gpt-oss-120b";

        // State variables
        let allConversations = JSON.parse(localStorage.getItem('chat_sessions')) || {};
        let currentSessionId = null;

        // UI Target Elements
        const chatBox = document.getElementById('chat-box');
        const chatForm = document.getElementById('chat-form');
        const userInput = document.getElementById('user-input');
        const submitBtn = document.getElementById('submit-btn');
        const modelToggleBtn = document.getElementById('model-toggle-btn');
        const newChatBtn = document.getElementById('new-chat-btn');
        const deleteCurrentBtn = document.getElementById('delete-current-btn');
        const clearAllBtn = document.getElementById('clear-all-btn');
        const historyList = document.getElementById('history-list');
        const sidebar = document.getElementById('sidebar');
        const mobileMenuBtn = document.getElementById('mobile-menu-btn');
        const sidebarOverlay = document.getElementById('sidebar-overlay');
        const splashScreen = document.getElementById('splash-screen');

        // Splash Screen Lifespan Handler
        window.addEventListener('DOMContentLoaded', () => {
            setTimeout(() => {
                splashScreen.classList.add('opacity-0', 'pointer-events-none');
                // Clean from DOM structure after transition duration complete
                setTimeout(() => splashScreen.remove(), 700);
            }, 1500); 
        });

        // Toggle overlapping panel display with smooth fade/slide effects
        function toggleSidebar() {
            const isHidden = sidebar.classList.contains('pointer-events-none');
            if (isHidden) {
                sidebar.classList.remove('-translate-x-4', 'opacity-0', 'pointer-events-none');
                sidebar.classList.add('translate-x-0', 'opacity-100', 'pointer-events-auto');
                sidebarOverlay.classList.remove('opacity-0', 'pointer-events-none');
                sidebarOverlay.classList.add('opacity-100', 'pointer-events-auto');
            } else {
                closeSidebar();
            }
        }

        function closeSidebar() {
            if (window.innerWidth >= 768) return;
            sidebar.classList.remove('translate-x-0', 'opacity-100', 'pointer-events-auto');
            sidebar.classList.add('-translate-x-4', 'opacity-0', 'pointer-events-none');
            sidebarOverlay.classList.remove('opacity-100', 'pointer-events-auto');
            sidebarOverlay.classList.add('opacity-0', 'pointer-events-none');
        }

        mobileMenuBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            toggleSidebar();
        });
        sidebarOverlay.addEventListener('click', closeSidebar);

        window.addEventListener('resize', () => {
            if (window.innerWidth >= 768) {
                sidebar.classList.remove('-translate-x-4', 'opacity-0', 'pointer-events-none');
                sidebar.classList.add('translate-x-0', 'opacity-100', 'pointer-events-auto');
                sidebarOverlay.classList.remove('opacity-100', 'pointer-events-auto');
                sidebarOverlay.classList.add('opacity-0', 'pointer-events-none');
            } else {
                sidebar.classList.remove('translate-x-0', 'opacity-100', 'pointer-events-auto');
                sidebar.classList.add('-translate-x-4', 'opacity-0', 'pointer-events-none');
            }
        });

        // Toggle Model Backend
        modelToggleBtn.addEventListener('click', () => {
            currentModelKey = (currentModelKey === "gpt-oss-120b") ? "gpt-oss-20b" : "gpt-oss-120b";
            modelToggleBtn.innerText = currentModelKey;
            appendMessage('system', `Switched backend model to: ${currentModelKey}`);
        });

        // Initialize a completely new clean session
        function startNewSession() {
            currentSessionId = 'chat_' + Date.now();
            allConversations[currentSessionId] = {
                title: "New Chat Session",
                timestamp: Date.now(),
                history: [{ role: "system", content: "You are an advanced assistant with live web search access. Provide up-to-date, accurate, and concise information based on web data when asked about current events or real-time data." }]
            };
            saveToStorage();
            renderSidebar();
            renderChatArea();
            appendMessage('assistant', "Hello! I now have live web browsing enabled. What can I look up for you today?");
            closeSidebar();
        }

        // Action feature: Deletes exclusively the active conversation tab
        function deleteActiveChat() {
            if (!currentSessionId) return;
            
            delete allConversations[currentSessionId];
            saveToStorage();

            const remaining = Object.keys(allConversations);
            if (remaining.length > 0) {
                currentSessionId = remaining.sort((a, b) => allConversations[b].timestamp - allConversations[a].timestamp)[0];
                renderSidebar();
                renderChatArea();
            } else {
                startNewSession();
            }
        }

        // Action feature: Clear all session records entirely
        function clearAllHistory() {
            if (confirm("Are you sure you want to clear your conversation history? This cannot be undone.")) {
                allConversations = {};
                localStorage.removeItem('chat_sessions');
                startNewSession();
            }
        }

        function saveToStorage() {
            localStorage.setItem('chat_sessions', JSON.stringify(allConversations));
        }

        // Render the chat tabs in the sidebar
        function renderSidebar() {
            historyList.innerHTML = '';
            const sortedSessions = Object.keys(allConversations).sort((a, b) => b.split('_')[1] - a.split('_')[1]);

            sortedSessions.forEach(id => {
                const session = allConversations[id];
                const activeClass = (id === currentSessionId) ? 'bg-slate-800 text-indigo-400 border border-slate-700' : 'hover:bg-slate-900 text-slate-400 hover:text-slate-200';
                
                const tab = document.createElement('div');
                tab.className = `group flex items-center justify-between p-2.5 rounded-lg text-sm font-medium transition-all cursor-pointer ${activeClass}`;
                
                const textSpan = document.createElement('span');
                textSpan.className = "truncate flex-1 pr-2";
                textSpan.innerText = session.title;
                textSpan.onclick = () => {
                    currentSessionId = id;
                    renderSidebar();
                    renderChatArea();
                    closeSidebar();
                };

                const deleteBtn = document.createElement('button');
                deleteBtn.className = "opacity-0 group-hover:opacity-100 text-slate-500 hover:text-rose-400 transition-opacity text-xs px-1 cursor-pointer";
                deleteBtn.innerHTML = "🗑️";
                deleteBtn.onclick = (e) => {
                    e.stopPropagation();
                    delete allConversations[id];
                    saveToStorage();
                    if (currentSessionId === id) {
                        const remaining = Object.keys(allConversations);
                        if (remaining.length > 0) currentSessionId = remaining[0];
                        else { startNewSession(); return; }
                    }
                    renderSidebar();
                    renderChatArea();
                };

                tab.appendChild(textSpan);
                tab.appendChild(deleteBtn);
                historyList.appendChild(tab);
            });
        }

        function renderChatArea() {
            chatBox.innerHTML = '';
            const session = allConversations[currentSessionId];
            if (!session) return;

            session.history.forEach((msg, index) => {
                if (index === 0 && msg.role === 'system') return;
                appendMessage(msg.role, msg.content, true);
            });
        }

        function appendMessage(role, text, isRenderingMode = false) {
            const messageDiv = document.createElement('div');
            
            if (role === 'system') {
                messageDiv.className = "text-center text-xs text-slate-500 bg-slate-800/10 border border-slate-800/60 py-1.5 rounded-lg max-w-xs mx-auto";
                messageDiv.innerText = text;
                chatBox.appendChild(messageDiv);
                chatBox.scrollTop = chatBox.scrollHeight;
                return;
            }

            messageDiv.className = `flex items-start gap-3 p-4 rounded-xl border ${
                role === 'user' 
                ? 'bg-slate-800 border-slate-600 ml-auto max-w-[85%] flex-row-reverse' 
                : 'bg-slate-800/40 border-slate-700/50 mr-auto max-w-[85%]'
            }`;

            const avatar = document.createElement('div');
            avatar.className = `${role === 'user' ? 'bg-emerald-600' : 'bg-indigo-600'} p-2 rounded-lg text-sm shrink-0`;
            avatar.innerText = role === 'user' ? '👤' : '🤖';

            const contentDiv = document.createElement('div');
            contentDiv.className = "whitespace-pre-wrap text-slate-200 text-sm leading-relaxed";
            
            const name = document.createElement('p');
            name.className = `font-semibold text-xs mb-1 ${role === 'user' ? 'text-emerald-400 text-right' : 'text-indigo-400'}`;
            name.innerText = role === 'user' ? 'You' : 'AI';

            contentDiv.appendChild(name);
            const textNode = document.createElement('p');
            textNode.innerText = text;
            contentDiv.appendChild(textNode);

            messageDiv.appendChild(avatar);
            messageDiv.appendChild(contentDiv);
            chatBox.appendChild(messageDiv);
            chatBox.scrollTop = chatBox.scrollHeight;

            if (!isRenderingMode && currentSessionId) {
                allConversations[currentSessionId].history.push({ role, content: text });
                saveToStorage();
            }
        }

        chatForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const prompt = userInput.value.trim();
            if (!prompt) return;

            if (!OPENROUTER_API_KEY || OPENROUTER_API_KEY.includes("YOUR_ACTUAL_KEY_HERE")) {
                alert('Please update the OPENROUTER_API_KEY variable inside the script tag!');
                return;
            }

            userInput.value = '';
            userInput.disabled = true;
            submitBtn.disabled = true;

            if (allConversations[currentSessionId].title === "New Chat Session") {
                allConversations[currentSessionId].title = prompt.length > 22 ? prompt.substring(0, 22) + "..." : prompt;
                renderSidebar();
            }

            appendMessage('user', prompt);

            const loadingDiv = document.createElement('div');
            loadingDiv.className = "text-sm text-slate-400 italic px-4 py-2 animate-pulse";
            loadingDiv.innerText = "Browsing web sources & generating response...";
            chatBox.appendChild(loadingDiv);
            chatBox.scrollTop = chatBox.scrollHeight;

            try {
                const response = await fetch("https://openrouter.ai/api/v1/chat/completions", {
                    method: "POST",
                    headers: {
                        "Authorization": `Bearer ${OPENROUTER_API_KEY}`,
                        "Content-Type": "application/json",
                        "HTTP-Referer": window.location.href, 
                        "X-Title": "HTML Chatbot Web Search Framework"         
                    },
                    body: JSON.stringify({
                        model: MODELS[currentModelKey],
                        messages: allConversations[currentSessionId].history,
                        tools: [{ type: "openrouter:web_search" }]
                    })
                });

                const data = await response.json();
                if (chatBox.contains(loadingDiv)) chatBox.removeChild(loadingDiv);

                if (!response.ok) throw new Error(data.error?.message || "Unknown API error.");

                const aiReply = data.choices[0].message.content;
                appendMessage('assistant', aiReply);

            } catch (error) {
                if (chatBox.contains(loadingDiv)) chatBox.removeChild(loadingDiv);
                appendMessage('system', `Error: ${error.message}`);
                console.error(error);
            } finally {
                userInput.disabled = false;
                submitBtn.disabled = false;
                userInput.focus();
            }
        });

        // Event hooks setup
        newChatBtn.addEventListener('click', startNewSession);
        deleteCurrentBtn.addEventListener('click', deleteActiveChat);
        clearAllBtn.addEventListener('click', clearAllHistory);

        // Bootstrap Lifecycle Startup Engine
        const sessionKeys = Object.keys(allConversations);
        if (sessionKeys.length > 0) {
            currentSessionId = sessionKeys.sort((a, b) => allConversations[b].timestamp - allConversations[a].timestamp)[0];
            renderSidebar();
            renderChatArea();
        } else {
            startNewSession();
        }
    </script>
</body>
</html>
